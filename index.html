<!DOCTYPE html>
<html>
<head>
    <script src="https://telegram.org/js/telegram-web-app.js"></script>
    <style>
        body { background: #1a1a1a; color: white; font-family: sans-serif; text-align: center; padding: 20px; }
        .card { background: #2d2d2d; border-radius: 15px; padding: 20px; margin-bottom: 15px; border: 1px solid #3d3d3d; }
        .icon { font-size: 30px; margin-bottom: 10px; }
        .btn { background: #0088cc; color: white; padding: 15px 30px; border-radius: 10px; border: none; font-weight: bold; width: 100%; cursor: pointer; }
        .status { color: #888; font-size: 14px; margin-top: 10px; }
    </style>
</head>
<body>
    <h2>Твой персональный доступ</h2>
    
    <div class="card">
        <div class="icon">📞</div>
        <h3>Чистый звук</h3>
        <p>Звонки в мессенджерах без задержек и помех.</p>
    </div>

    <div class="card">
        <div class="icon">🚀</div>
        <h3>Без пауз</h3>
        <p>Видео и ленты грузятся мгновенно.</p>
    </div>

    <button class="btn" onclick="getAccess()">Получить доступ на 3 дня</button>
    <div class="status" id="statusText">Осталось попыток: 1</div>

    <script>
        let tg = window.Telegram.WebApp;
        tg.expand(); // Развернуть на весь экран

        function getAccess() {
            // Отправляем данные обратно боту
            tg.sendData("action_get_test");
            document.getElementById("statusText").innerText = "Запрос отправлен...";
        }
    </script>
</body>
</html>
