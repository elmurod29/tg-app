<!DOCTYPE html>
<html>
<head>
    <meta charset="UTF-8">
    <title>SafeTunnel Test</title>
    <script src="https://unpkg.com/vconsole@latest/dist/vconsole.min.js"></script>
    <script>
        var vConsole = new window.VConsole();
    </script>
    <script src="https://telegram.org/js/telegram-web-app.js"></script>
    <style>
        body { font-family: sans-serif; background: #1a1a1a; color: white; text-align: center; padding: 20px; }
        .btn { background: #0088cc; color: white; border: none; padding: 15px 30px; border-radius: 10px; font-size: 18px; cursor: pointer; }
    </style>
</head>
<body>
    <div id="main">
        <h2>SafeTunnel</h2>
        <button class="btn" onclick="send('action_get_test')">🎁 Получить тест</button>
    </div>

    <script>
        let tg = window.Telegram.WebApp;
        tg.expand();

        const urlParams = new URLSearchParams(window.location.search);
        const hasKey = urlParams.get('hasKey');

        if (hasKey === 'true') {
            document.getElementById('main').innerHTML = "<h3>✅ Доступ уже активен</h3>";
        }

        function send(action) {
            console.log("Пытаюсь отправить действие: " + action);
            try {
                // Пытаемся отправить данные в бот
                tg.sendData(action);
                console.log("Данные отправлены успешно!");
                tg.close();
            } catch (e) {
                console.error("Ошибка при отправке: " + e);
                alert("Ошибка! Проверьте, что открыли через нижнюю кнопку.");
            }
        }
    </script>
</body>
</html>
